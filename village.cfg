# SeedForge — find seeds with a village within 500 blocks of origin.
# Villages are common so expect many hits; narrow seed_end or add more
# filters (e.g. biome_at, structure for a second village) to reduce output.
mc = 1.21
dim = 0
seed_start = 0
seed_end = 30000
out = village_hits.txt
verbose = 1

[filter]
kind         = spawn_biome
spawn_biomes = mushroom_fields, cherry_grove