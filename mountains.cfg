# mountains.cfg — find the BIGGEST mountain biome, ranked by size. Dual-GPU.
#
#   ./seedforge_gpu mountains.cfg
#
# How it works (the "largest biome" two-phase technique):
#   Phase 1  biome_area  — a cheap, full-coverage box-count throws out the ~99%
#                          of seeds with little mountain near the origin.
#   Phase 2  biome_size  — a flood fill measures the largest CONTIGUOUS mountain
#                          blob on the survivors; the runner ranks every hit by
#                          that size and writes them biggest-first.
#
# Output (hitsm.txt):  seed <TAB> x <TAB> z <TAB> size_in_blocks   (biggest first)
#
# "mountains" expands to the whole 1.18+ mountain group — windswept_hills,
# wooded/gravelly mountains, meadow, grove, snowy_slopes, jagged/frozen/stony
# peaks — and the flood fill spans them as one range.
#
# Why a FIXED (0,0) anchor: every seed is a fresh random world, so the origin is
# a fine fixed sample point. We don't need the biggest mountain *in* a world — we
# need a SEED with a giant mountain at a known spot, and seeds are unlimited. A
# fixed anchor is also far faster than center_spawn (which costs a getSpawn per
# seed). The window only sees the slice of a biome overlapping it, so both phases
# scan the same +/-1280 block area.

mc = 1.21
dim = 0
seed_start = 6321123900000000000
seed_end =   6321123900050000000   # 100M ≈ a few GPU-hours. Widen toward 1e9+ for record
                            # hunts (and then raise min_area — see the cap note).
out = hitsm.txt
verbose = 1
top_n = 20                  # keep only the 20 biggest seeds globally (across all GPUs)
gpus = 0, 1                 # both cards; the range is split across them.
                            # (CUDA orders the RTX 5060 Ti as device 0 here.)

# --- Phase 1: cheap, FULL-COVERAGE prefilter ---------------------------------
# Covers the SAME +/-1280 area as phase 2 but at a coarse step (81 samples), so
# it's cheap yet can't miss a big blob that sits off-origin. `count` is the recall
# knob: a >=2M-block blob lights up ~19 of these 81 cells, so 8 catches it with
# margin while still rejecting the vast majority of seeds. Auto-runs first (lower
# cost). Lower `count` = safer recall but slower; raise it to go faster.
[filter]
kind = biome_area
biomes = badlands
x = 0
z = 0
radius = 1280
step = 320
count = 8

# --- Phase 2: contiguous-size measurement ------------------------------------
# Flood fill, sized to fill the GPU's per-thread cap (SF_FLOOD_MAX_CELLS_GPU=512):
# radius 1280 / step 128 = 21x21 = 441 cells, a 2560x2560 window. area =
# contiguous_cells * step^2, so the most it can report on GPU is 441*128^2 ≈ 7.2M
# blocks — keep min_area below that.
#
# min_area is an ABSOLUTE floor: set it above what any seed reaches and the output
# is EMPTY. 2,000,000 is selective-but-reachable (in a 300k-seed probe the best
# was ~2.5M; over 100M the tail goes well past that). To recalibrate for a new
# window: run once with min_area = 1, read the biggest sizes off the top of the
# output, then set min_area just under that.
[filter]
kind = biome_size
biomes = badlands
x = 0
z = 0
radius = 1280
step = 128
min_area = 2000

# ── Notes ─────────────────────────────────────────────────────────────────────
# • GPU hit buffer caps at SF_MAX_HITS (4096). Over ~1e9+ seeds, min_area = 2M
#   would overflow it and stop the search early — raise min_area to ~3M for
#   billion-seed sweeps so only the genuine monsters are kept.
# • For a PRECISE, larger measurement of your top seeds, re-run just those on the
#   CPU build (./seedforge_cpu) — its window cap is 128x the GPU's, so you can use
#   a finer step / bigger radius. seedforge_cpu is also the correctness reference.
# • Other categories work the same way: swap `mountains` for oceans, forests,
#   jungles, taigas, badlands, or a comma list of biome names.
