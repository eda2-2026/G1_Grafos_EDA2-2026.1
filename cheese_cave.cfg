# cheese_cave.cfg — Find seeds with the biggest cheese cave.
#
# Cheese caves are the large open-pocket caves added in 1.18 Caves & Cliffs.
# They generate from the 'minecraft:cave_cheese' noise, independent of biome.
# This config measures the 2D footprint of the largest contiguous high-noise
# region at Y=-40 (a sweet spot for cheese cave formation).
#
# Two-phase workflow (recommended for large searches):
#   1. GPU sweep (cheese_cave with coarse step=16, loose min_area=5000):
#        ./seedforge_gpu cheese_cave.cfg
#   2. CPU re-measure survivors (smaller step=8, tight min_area):
#        ./seedforge_cpu cheese_cave_precise.cfg   (set seed_start/end from hits)
#
# Tuning cave_threshold:
#   0.0  — any positive noise; very inclusive, ~50% hit rate per cell (noisy)
#   0.5  — default; finds well-developed cheese caves (~20% hit rate per cell)
#   0.7  — only the deepest centres; <10% hit rate, fewest false positives
#
# Output size column = area in blocks of the largest connected cave cross-section
# at Y=-40 (cells * step^2). Higher = bigger cheese cave. The biggest cheese
# cave found at this scale will have output sorted with largest first.

mc = 1.21
seed_start = 0
seed_end   = 10000000
out        = cheese_hits.txt
top_n      = 100

[filter]
kind        = cheese_cave
x           = 0
z           = 0
y           = -40          # underground block Y; cheese caves peak around Y=-30 to -70
radius      = 512          # block radius of scan window
step        = 16           # grid spacing in blocks; coarser = faster, GPU-friendly
cave_threshold = 0.5       # noise threshold above which a cell counts as cave air
min_area    = 5000         # minimum contiguous area in blocks (cells * step^2)
                           # at step=16: 5000 blocks ≈ 20 cells ≈ a 4x5 patch
